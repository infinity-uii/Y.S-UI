<!-- Tools page (inserted next to other pages) -->
<div class="page" id="page-tools" style="display:none;">
  <div style="padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-size:18px;font-weight:600;">Tools</div>
      <div style="color:var(--text2);font-size:13px;margin-top:2px;">Discovered MCP tools and local stdio tools</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn" id="refresh-tools-btn">↻ Refresh</button>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:20px;">
    <div id="tools-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;"></div>
    <div id="tool-run-output" style="margin-top:12px;background:var(--bg);border:1px solid var(--border);padding:12px;border-radius:8px;white-space:pre-wrap;font-family:monospace;max-height:320px;overflow:auto;display:none;"></div>
  </div>
</div>

<script>
// Tools JS
async function loadTools(){
  const res = await API.get('/api/tools');
  if(!res?.ok) return;
  const list = document.getElementById('tools-list');
  list.innerHTML = '';
  res.tools.forEach(t=>{
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
        <div>
          <div style="font-weight:600">${esc(t.label)} <span style="font-size:12px;color:var(--text3);">(${esc(t.name)})</span></div>
          <div style="font-size:12px;color:var(--text2);margin-top:6px;">${esc(t.description)}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:6px;">Transport: ${esc(t.transport)} • Endpoint: ${esc(t.endpoint)}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
          <label style="font-size:12px;color:var(--text3);">Enabled
            <input type="checkbox" class="tool-enabled" data-name="${esc(t.name)}" ${t.enabled? 'checked':''} />
          </label>
          <button class="btn btn-sm run-tool-btn" data-name="${esc(t.name)}">Run</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  });
  document.querySelectorAll('.tool-enabled').forEach(cb=>cb.addEventListener('change', async (e)=>{
    const name = e.target.dataset.name; const enabled = e.target.checked;
    await API.post('/api/tools/enable', { name, enabled });
    toast((enabled? 'Enabled ':'Disabled ') + name, 'info');
  }));
  document.querySelectorAll('.run-tool-btn').forEach(btn=>btn.addEventListener('click', ()=>{
    const name = btn.dataset.name; runTool(name);
  }));
}

async function runTool(name){
  const out = document.getElementById('tool-run-output');
  out.style.display = 'block'; out.textContent = '';
  try{
    const res = await API.streamChat({}); // dummy to ensure headers? not needed
  }catch{}
  const evtSource = await fetch('/api/tools/run', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, input: {} })
  });
  if(!evtSource.ok){
    const txt = await evtSource.text(); out.textContent = txt; return;
  }
  const reader = evtSource.body.getReader();
  const decoder = new TextDecoder();
  function read(){
    reader.read().then(({done, value})=>{
      if(done) return;
      const chunk = decoder.decode(value);
      // SSE parsing: lines like data: {..}\n\n
      out.textContent += chunk.replace(/data: /g,'');
      out.scrollTop = out.scrollHeight;
      read();
    });
  }
  read();
}

document.getElementById('refresh-tools-btn').addEventListener('click', loadTools);

// Integrate navigation
const toolsNav = document.createElement('div');
toolsNav.className = 'nav-item'; toolsNav.dataset.page = 'tools';
toolsNav.innerHTML = '<span class="nav-icon">🧰</span> Tools';
document.querySelector('#sidebar .sidebar-section + .nav-item').after(toolsNav);
toolsNav.addEventListener('click', ()=> navigateTo('tools'));

// load tools when Tools page opened
function navigateTo(page){
  // reuse existing navigateTo – override to add tools loading
  State.currentPage = page;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const pageEl = document.getElementById(`page-${page}`);
  if(pageEl) pageEl.classList.add('active');
  document.querySelectorAll(`.nav-item[data-page="${page}"]`).forEach(n=>n.classList.add('active'));
  if(page==='tools') loadTools();
}

</script>

</body>
</html>
